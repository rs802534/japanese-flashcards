<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>कृष्ण फ्लैश — Krishna Flash</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d47a1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="कृष्ण फ्लैश">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --deep:#020c18;--navy:#041825;--blue1:#0d47a1;--blue2:#1565c0;--blue3:#1e88e5;
  --sky:#42a5f5;--gold1:#ffe066;--gold2:#ffca28;--gold3:#ffa000;
  --green1:#1b5e20;--green2:#2e7d32;--green3:#43a047;--leaf:#66bb6a;
  --text:#e8f4ff;--muted:#90bdd4;--faint:#3a6a8a;
}
body{background:var(--deep);color:var(--text);font-family:'Cinzel',serif;min-height:100vh;overflow-x:hidden;position:relative;}

.bg-sky{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 100% 60% at 50% 0%,#0a2a5a,transparent 70%),
    radial-gradient(ellipse 80% 50% at 0% 50%,#0d3a1a,transparent 60%),
    radial-gradient(ellipse 80% 50% at 100% 50%,#0d3a1a,transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 100%,#1b5e20,transparent 60%),
    linear-gradient(180deg,#020c18 0%,#041825 40%,#0d3a1a 100%);}

.bg-stars{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(1px 1px at 10% 15%,#ffe066cc,transparent),
    radial-gradient(1px 1px at 25% 8%,#fff8,transparent),
    radial-gradient(1px 1px at 40% 20%,#ffe06699,transparent),
    radial-gradient(1px 1px at 55% 5%,#fff6,transparent),
    radial-gradient(1px 1px at 70% 12%,#ffe066aa,transparent),
    radial-gradient(1px 1px at 82% 18%,#fff7,transparent),
    radial-gradient(2px 2px at 35% 10%,#ffe066ee,transparent),
    radial-gradient(2px 2px at 75% 6%,#fffaaa,transparent);}

.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 50% 40% at 50% 65%,#ffe06612,transparent 60%);}

.bg-trees{position:fixed;bottom:0;left:0;right:0;z-index:0;pointer-events:none;}

.petals{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.petal{position:absolute;top:-30px;animation:fall linear infinite;}
@keyframes fall{0%{transform:translateY(-30px) rotate(0deg) translateX(0);opacity:0;}8%{opacity:1;}90%{opacity:0.6;}100%{transform:translateY(110vh) rotate(720deg) translateX(50px);opacity:0;}}

.app{position:relative;z-index:2;max-width:720px;margin:0 auto;padding:20px 16px 80px;}

.topbar{text-align:center;margin-bottom:20px;padding:20px 16px 16px;
  background:rgba(4,24,37,0.75);backdrop-filter:blur(14px);border-radius:18px;
  border:1px solid rgba(255,224,102,0.25);
  box-shadow:0 4px 30px rgba(0,0,0,0.4),0 0 40px rgba(255,224,102,0.05);
  position:relative;overflow:hidden;}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold2),var(--sky),var(--gold2),transparent);}

.logo-main{font-family:'Cinzel',serif;font-size:22px;font-weight:700;
  background:linear-gradient(135deg,var(--gold1) 0%,var(--gold2) 40%,var(--sky) 70%,var(--gold1) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:4px;line-height:1.2;margin-bottom:3px;}
.logo-sub{font-size:9px;letter-spacing:4px;color:var(--muted);opacity:0.8;}
.om-deco{font-size:16px;margin:0 6px;opacity:0.7;}

.streak-bar{display:flex;align-items:center;justify-content:center;
  background:rgba(4,24,37,0.65);backdrop-filter:blur(10px);
  border:1px solid rgba(255,224,102,0.2);border-radius:50px;padding:10px 20px;margin-bottom:16px;
  box-shadow:0 2px 20px rgba(0,0,0,0.3);}
.streak-col{text-align:center;padding:0 18px;}
.streak-num{font-family:'Cinzel',serif;font-size:22px;line-height:1;}
.streak-num.fire{color:var(--gold2);text-shadow:0 0 10px var(--gold3);}
.streak-num.known{color:var(--leaf);}
.streak-num.total{color:var(--sky);}
.streak-label{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:1px;}
.streak-div{width:1px;height:36px;background:rgba(255,224,102,0.2);}

.wotd{background:rgba(4,24,37,0.72);backdrop-filter:blur(12px);
  border:1px solid rgba(255,202,40,0.3);border-radius:16px;padding:16px 18px;margin-bottom:16px;
  position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.35);}
.wotd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent);}
.wotd-badge{display:inline-block;font-size:9px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--blue1),var(--blue3));
  color:var(--gold1);padding:3px 14px;border-radius:20px;margin-bottom:10px;
  border:1px solid rgba(255,224,102,0.3);}
.wotd-kanji{font-family:'Noto Serif JP',serif;font-size:36px;font-weight:700;
  background:linear-gradient(135deg,var(--gold1),var(--sky),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;margin-bottom:4px;}
.wotd-reading{font-size:13px;color:var(--gold2);margin-bottom:3px;letter-spacing:3px;font-family:'Noto Serif JP',serif;}
.wotd-meaning{font-size:14px;color:var(--sky);margin-bottom:8px;}
.wotd-sentence{font-size:11px;color:var(--muted);line-height:1.8;
  border-top:1px solid rgba(255,224,102,0.15);padding-top:8px;
  font-family:'Noto Serif JP',serif;font-style:italic;}

.filter-wrap{background:rgba(4,24,37,0.65);backdrop-filter:blur(10px);
  border:1px solid rgba(255,224,102,0.15);border-radius:14px;padding:12px 14px;margin-bottom:14px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.filter-label{font-size:9px;letter-spacing:2px;color:var(--faint);margin-right:4px;}
.cat-btn{background:rgba(13,71,161,0.3);border:1px solid rgba(255,224,102,0.2);
  color:var(--muted);padding:5px 14px;font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:1px;cursor:pointer;transition:all 0.2s;border-radius:20px;}
.cat-btn:hover{border-color:var(--gold2);color:var(--gold1);}
.cat-btn.active{background:linear-gradient(135deg,var(--blue1),var(--blue3));
  border-color:var(--gold2);color:var(--gold1);box-shadow:0 2px 12px rgba(13,71,161,0.5);}
.controls{display:flex;gap:6px;margin-left:auto;}
.ctrl-btn{background:rgba(13,71,161,0.3);border:1px solid rgba(255,224,102,0.2);
  color:var(--muted);padding:5px 12px;font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:1px;cursor:pointer;transition:all 0.2s;border-radius:20px;}
.ctrl-btn:hover{border-color:var(--gold2);color:var(--gold1);}
.ctrl-btn.on{background:linear-gradient(135deg,var(--green1),var(--green3));border-color:var(--leaf);color:#fff;}

.prog-wrap{background:rgba(4,24,37,0.6);backdrop-filter:blur(8px);
  border:1px solid rgba(255,224,102,0.12);border-radius:12px;padding:10px 14px;margin-bottom:14px;}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.prog-row:last-child{margin-bottom:0;}
.prog-name{width:90px;font-size:9px;letter-spacing:1px;color:var(--muted);flex-shrink:0;}
.prog-track{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:5px;
  background:linear-gradient(90deg,var(--blue1),var(--sky),var(--gold2));
  box-shadow:0 0 8px rgba(66,165,245,0.5);transition:width 0.6s ease;}
.prog-count{width:30px;text-align:right;font-size:9px;color:var(--muted);}

.counter{text-align:center;font-size:11px;letter-spacing:3px;color:var(--faint);margin-bottom:14px;}
.counter span{font-size:16px;color:var(--gold2);text-shadow:0 0 8px var(--gold3);}

.card-area{perspective:1400px;margin-bottom:14px;cursor:pointer;}
.card-3d{position:relative;width:100%;transform-style:preserve-3d;transition:transform 0.65s cubic-bezier(0.23,1,0.32,1);}
.card-3d.flipped{transform:rotateY(180deg);}
.card-face{backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:rgba(4,24,37,0.85);backdrop-filter:blur(16px);
  border:1px solid rgba(255,202,40,0.3);border-radius:18px;padding:36px 28px;
  min-height:270px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 0 40px rgba(13,71,161,0.1);
  transition:border-color 0.2s,box-shadow 0.2s;}
.card-face::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:18px 18px 0 0;
  background:linear-gradient(90deg,transparent,var(--gold2),var(--sky),var(--gold2),transparent);}
.card-back{position:absolute;top:0;left:0;width:100%;transform:rotateY(180deg);}

.card-cat{position:absolute;top:14px;left:14px;font-size:9px;letter-spacing:2px;color:var(--gold2);opacity:0.7;}
.card-hint{position:absolute;bottom:12px;right:14px;font-size:10px;color:var(--faint);letter-spacing:1px;}
.known-badge{position:absolute;top:12px;right:12px;font-size:9px;padding:2px 10px;border-radius:20px;
  background:linear-gradient(135deg,var(--green1),var(--green3));color:#fff;display:none;
  box-shadow:0 2px 8px rgba(46,125,79,0.4);}
.card-face.is-known .known-badge{display:block;}

.peacock-eye{position:absolute;opacity:0.12;}
.pe-tl{top:10px;left:12px;}
.pe-br{bottom:10px;right:12px;transform:rotate(180deg);}

.furigana-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:8px;}
.furigana-text{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:300;
  color:var(--sky);letter-spacing:5px;text-align:center;text-shadow:0 0 8px rgba(66,165,245,0.4);}
.kanji-main{font-family:'Noto Serif JP',serif;font-size:68px;font-weight:700;
  background:linear-gradient(135deg,var(--gold1) 0%,#fff 40%,var(--gold2) 70%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;margin-bottom:10px;text-align:center;
  filter:drop-shadow(0 0 12px rgba(255,224,102,0.3));}

.back-kanji-small{font-family:'Noto Serif JP',serif;font-size:20px;color:var(--gold2);margin-bottom:2px;text-align:center;}
.back-hira{font-family:'Noto Serif JP',serif;font-size:14px;color:var(--sky);letter-spacing:3px;margin-bottom:6px;text-align:center;}
.back-meaning{font-family:'Cinzel',serif;font-size:24px;font-weight:700;
  background:linear-gradient(135deg,var(--gold1),var(--sky));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;text-align:center;line-height:1.3;}
.back-divider{width:80px;height:1px;margin:8px auto;
  background:linear-gradient(90deg,transparent,var(--gold2),var(--sky),var(--gold2),transparent);}
.back-context{font-size:12px;color:var(--muted);text-align:center;line-height:1.8;max-width:380px;margin-bottom:8px;}
.back-sentence{font-size:11px;color:var(--text);text-align:center;line-height:1.9;
  background:rgba(13,71,161,0.2);border-radius:10px;padding:8px 14px;
  border-left:2px solid var(--gold2);max-width:400px;font-family:'Noto Serif JP',serif;}

.flip-hint{text-align:center;font-size:10px;letter-spacing:2px;color:var(--gold2);opacity:0.5;margin-bottom:10px;}

.actions{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;}
.act-btn{background:rgba(4,24,37,0.7);backdrop-filter:blur(8px);
  border:1px solid rgba(255,224,102,0.2);padding:10px 16px;font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;border-radius:25px;
  color:var(--muted);box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.btn-known{border-color:rgba(102,187,106,0.5);color:var(--leaf);}
.btn-known:hover{background:rgba(27,94,32,0.3);transform:translateY(-1px);}
.btn-learning{border-color:rgba(239,83,80,0.4);color:#ef5350;}
.btn-learning:hover{background:rgba(183,28,28,0.2);transform:translateY(-1px);}
.btn-speak{border-color:rgba(66,165,245,0.4);color:var(--sky);}
.btn-speak:hover{background:rgba(13,71,161,0.3);transform:translateY(-1px);}
.btn-nav{border-color:rgba(255,224,102,0.2);color:var(--muted);}
.btn-nav:hover{border-color:var(--gold2);color:var(--gold1);transform:translateY(-1px);}
@keyframes pulse-speak{0%{box-shadow:0 0 0 0 rgba(66,165,245,0.5)}70%{box-shadow:0 0 0 10px transparent}100%{box-shadow:0 0 0 0 transparent}}
.btn-speak.speaking{animation:pulse-speak 0.9s infinite;background:rgba(13,71,161,0.3);}

.kb-hint{text-align:center;font-size:9px;color:var(--faint);letter-spacing:2px;}
.kb-hint span{border:1px solid rgba(255,224,102,0.15);padding:1px 5px;border-radius:4px;margin:0 2px;}

.loading{text-align:center;padding:80px 20px;font-family:'Cinzel',serif;font-size:13px;color:var(--gold2);letter-spacing:4px;}
@keyframes blink{0%,100%{opacity:0.2}50%{opacity:1}}
.loading span{animation:blink 1.4s infinite;}
.empty-state{text-align:center;padding:60px 20px;font-size:13px;color:var(--faint);}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.card-area{animation:cardIn 0.35s ease;}
</style>
</head>

<div class="petals" id="petals"></div>

<div class="app">

  <!-- HEADER -->
  <div class="topbar">
    <svg width="130" height="115" viewBox="0 0 130 115" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto 10px;">
      <!-- Stars background -->

      <!-- Pitambar shine -->

      <circle cx="72" cy="45" r="1.5" fill="#ffe066" opacity="0.5"/>

      <circle cx="42" cy="57" r="1" fill="#0d47a1" opacity="0.6" transform="rotate(-10 42 57)"/>
      <circle cx="48" cy="56" r="1" fill="#0d47a1" opacity="0.6" transform="rotate(-10 48 56)"/>
      <circle cx="54" cy="55" r="1" fill="#0d47a1" opacity="0.6" transform="rotate(-10 54 55)"/>
      <!-- Musical notes -->
      <text x="96" y="50" font-size="9" fill="#ffe066" opacity="0.6" font-family="serif">♪</text>
      <text x="103" y="40" font-size="7" fill="#42a5f5" opacity="0.5" font-family="serif">♫</text>
      <text x="90" y="34" font-size="8" fill="#ffe066" opacity="0.4" font-family="serif">♩</text>
      <!-- Peacock (mor) beside Krishna -->
      <ellipse cx="105" cy="85" rx="11" ry="7" fill="#1e88e5" opacity="0.55"/>
      <ellipse cx="105" cy="78" rx="7" ry="6" fill="#1565c0" opacity="0.65"/>
      <!-- Peacock tail feathers -->
      <path d="M98 75 Q93 62 95 56 Q97 53 99 57 Q98 64 100 72 Z" fill="#1b5e20" opacity="0.55"/>
      <path d="M105" cy="75" Q103 60 105 54 Q107 51 108 55 Q107 62 107 72 Z" fill="#2e7d32" opacity="0.5"/>
      <path d="M112 75 Q115 62 113 55 Q111 52 110 56 Q111 63 110 72 Z" fill="#43a047" opacity="0.55"/>
      <circle cx="95" cy="57" r="2" fill="#ffe066" opacity="0.4"/>
      <circle cx="105" cy="54" r="2" fill="#ffe066" opacity="0.4"/>
      <circle cx="113" cy="56" r="2" fill="#ffe066" opacity="0.4"/>
      <!-- Peacock body -->
      <ellipse cx="105" cy="92" rx="5" ry="10" fill="#0d47a1" opacity="0.55"/>
      <!-- Kadamba tree hint behind -->
      <circle cx="12" cy="55" r="18" fill="#1b5e20" opacity="0.3"/>
      <circle cx="12" cy="45" r="12" fill="#2e7d32" opacity="0.25"/>
      <rect x="10" y="65" width="4" height="30" rx="2" fill="#0a0600" opacity="0.3"/>
      <!-- Yamuna water hint at bottom -->
      <ellipse cx="65" cy="112" rx="45" ry="4" fill="#1565c0" opacity="0.2"/>
    </svg>
    <div class="logo-main"><span class="om-deco">ॐ</span> कृष्ण फ्लैश <span class="om-deco">ॐ</span></div>
    <div class="logo-sub">KRISHNA FLASH · SAP JAPANESE VOCABULARY · VRINDAVAN</div>
  </div>

  <!-- STREAK -->
  <div class="streak-bar">
    <div class="streak-col"><div class="streak-num fire" id="streak-num">0</div><div class="streak-label">🔥 DAY STREAK</div></div>
    <div class="streak-div"></div>
    <div class="streak-col"><div class="streak-num known" id="stat-known">0</div><div class="streak-label">✓ KNOWN</div></div>
    <div class="streak-div"></div>
    <div class="streak-col"><div class="streak-num total" id="stat-total">0</div><div class="streak-label">🦚 TOTAL</div></div>
  </div>

  <!-- WORD OF THE DAY -->
  <div class="wotd">
    <div class="wotd-badge">🦚 WORD OF THE DAY · आज का शब्द 🦚</div>
    <div class="wotd-kanji" id="wotd-kanji">—</div>
    <div class="wotd-reading" id="wotd-reading"></div>
    <div class="wotd-meaning" id="wotd-meaning"></div>
    <div class="wotd-sentence" id="wotd-sentence"></div>
  </div>

  <!-- FILTERS -->
  <div class="filter-wrap">
    <div class="filter-row" id="filters">
      <span class="filter-label">Category</span>
      <button class="cat-btn active" data-cat="ALL">All 🦚</button>
      <div class="controls">
        <button class="ctrl-btn" id="btn-shuffle">⇄ Shuffle</button>
        <button class="ctrl-btn" id="btn-hide-known">Hide Known</button>
      </div>
    </div>
  </div>

  <div class="prog-wrap"><div id="cat-progress"></div></div>
  <div class="counter" id="counter"></div>

  <div class="card-area" id="card-area">
    <div class="loading"><span>🦚 Loading...</span></div>
  </div>

  <div class="flip-hint" id="flip-hint">✦ tap card to reveal meaning ✦</div>

  <div class="actions">
    <button class="act-btn btn-nav" onclick="navigate(-1)">◀ Prev</button>
    <button class="act-btn btn-speak" id="btn-speak" onclick="speakCard()">♪ Listen</button>
    <button class="act-btn btn-known" onclick="markKnown()">✓ Known</button>
    <button class="act-btn btn-learning" onclick="markLearning()">✕ Learning</button>
    <button class="act-btn btn-nav" onclick="navigate(1)">Next ▶</button>
  </div>

  <div class="kb-hint">
    <span>←→</span> navigate &nbsp;<span>Space</span> flip &nbsp;<span>K</span> known &nbsp;<span>X</span> learning &nbsp;<span>S</span> speak
  </div>
</div>

<script>
if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

const ITEMS=[
  '<svg width="10" height="20" viewBox="0 0 10 20"><ellipse cx="5" cy="10" rx="4" ry="9" fill="#1e88e5" opacity="0.7"/><ellipse cx="5" cy="6" rx="2" ry="4" fill="#42a5f5" opacity="0.6"/><circle cx="5" cy="4" r="2" fill="#ffe066" opacity="0.8"/></svg>',
  '<svg width="13" height="13" viewBox="0 0 13 13"><ellipse cx="6.5" cy="6.5" rx="5.5" ry="3.5" fill="#43a047" opacity="0.65" transform="rotate(-20 6.5 6.5)"/></svg>',
  '<svg width="11" height="11" viewBox="0 0 11 11"><ellipse cx="5.5" cy="5.5" rx="4.5" ry="3" fill="#66bb6a" opacity="0.6" transform="rotate(30 5.5 5.5)"/></svg>',
  '<svg width="8" height="14" viewBox="0 0 8 14"><ellipse cx="4" cy="7" rx="3" ry="6" fill="#1565c0" opacity="0.65"/><circle cx="4" cy="3" r="2" fill="#ffe066" opacity="0.7"/></svg>',
  '<svg width="10" height="10" viewBox="0 0 10 10"><path d="M5 1L6.2 4H9.5L6.8 5.9 7.9 9 5 7.1 2.1 9 3.2 5.9.5 4H3.8Z" fill="#ffe066" opacity="0.45"/></svg>',
];
function spawnItem(){
  const el=document.createElement('div');el.className='petal';
  el.innerHTML=ITEMS[Math.floor(Math.random()*ITEMS.length)];
  el.style.left=Math.random()*100+'vw';el.style.opacity=(0.4+Math.random()*0.6).toString();
  const dur=9+Math.random()*14;el.style.animationDuration=dur+'s';el.style.animationDelay=(Math.random()*dur)+'s';
  el.style.transform='scale('+(0.6+Math.random()*1)+')';
  document.getElementById('petals').appendChild(el);setTimeout(()=>el.remove(),(dur+3)*1000);
}
for(let i=0;i<14;i++) setTimeout(()=>spawnItem(),i*600);
setInterval(spawnItem,2000);

function loadStreak(){
  const today=new Date().toISOString().slice(0,10);
  let d=JSON.parse(localStorage.getItem('krishna-streak')||'{"streak":0,"last":""}');
  const yest=new Date();yest.setDate(yest.getDate()-1);
  if(d.last===today) return d.streak;
  d.streak=d.last===yest.toISOString().slice(0,10)?d.streak+1:1;d.last=today;
  localStorage.setItem('krishna-streak',JSON.stringify(d));return d.streak;
}
document.getElementById('streak-num').textContent=loadStreak();

let ALL_CARDS=[],deck=[],currentCat="ALL",currentIdx=0,isFlipped=false,hideKnown=false;
let knownSet=new Set(),learningSet=new Set();
function getKey(c){return c.cat+'|'+c.kanji;}

function setWOTD(cards){
  if(!cards.length) return;
  const w=cards[Math.floor(Date.now()/86400000)%cards.length];
  document.getElementById('wotd-kanji').textContent=w.kanji;
  document.getElementById('wotd-reading').textContent=w.reading;
  document.getElementById('wotd-meaning').textContent=w.meaning;
  document.getElementById('wotd-sentence').textContent=w.context||'';
}

async function loadWords(){
  try{
    const res=await fetch('words.json?v='+Date.now());
    if(!res.ok) throw new Error();
    ALL_CARDS=await res.json();
    setWOTD(ALL_CARDS);
    document.getElementById('stat-total').textContent=ALL_CARDS.length;
    buildCatBtns();render();
  }catch(e){
    document.getElementById('card-area').innerHTML='<div class="empty-state">🦚 Could not load words.json</div>';
  }
}

function buildCatBtns(){
  const cats=[...new Set(ALL_CARDS.map(c=>c.cat))];
  const el=document.getElementById('filters'),ctrl=document.querySelector('.controls');
  el.querySelectorAll('.cat-btn:not([data-cat="ALL"])').forEach(b=>b.remove());
  cats.forEach(cat=>{
    const btn=document.createElement('button');btn.className='cat-btn';btn.dataset.cat=cat;btn.textContent=cat;
    btn.addEventListener('click',()=>{document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');currentCat=cat;currentIdx=0;render();});
    el.insertBefore(btn,ctrl);
  });
  document.querySelector('.cat-btn[data-cat="ALL"]').addEventListener('click',function(){
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');currentCat="ALL";currentIdx=0;render();
  });
}

function buildDeck(){
  deck=currentCat==="ALL"?[...ALL_CARDS]:ALL_CARDS.filter(c=>c.cat===currentCat);
  if(hideKnown) deck=deck.filter(c=>!knownSet.has(getKey(c)));
  if(currentIdx>=deck.length) currentIdx=Math.max(0,deck.length-1);
}

function buildProgress(){
  const cats=[...new Set(ALL_CARDS.map(c=>c.cat))];
  const el=document.getElementById('cat-progress');el.innerHTML='';
  cats.forEach(cat=>{
    const total=ALL_CARDS.filter(c=>c.cat===cat).length;
    const known=ALL_CARDS.filter(c=>c.cat===cat&&knownSet.has(getKey(c))).length;
    const pct=total?Math.round(known/total*100):0;
    const row=document.createElement('div');row.className='prog-row';
    row.innerHTML=`<div class="prog-name">${cat}</div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-count">${known}/${total}</div>`;
    el.appendChild(row);
  });
}

const PEACOCK=`<svg width="22" height="22" viewBox="0 0 22 22"><ellipse cx="11" cy="11" rx="9" ry="9" fill="none" stroke="#ffe066" stroke-width="0.5" opacity="0.5"/><ellipse cx="11" cy="11" rx="5" ry="7" fill="#1e88e5" opacity="0.2"/><circle cx="11" cy="11" r="2.5" fill="#ffe066" opacity="0.3"/><circle cx="11" cy="11" r="1.2" fill="#1565c0" opacity="0.6"/></svg>`;

function cardHTML(){
  return `<div class="card-3d" id="card-3d">
    <div class="card-face" id="card-front">
      <div class="peacock-eye pe-tl">${PEACOCK}</div>
      <div class="peacock-eye pe-br">${PEACOCK}</div>
      <div class="card-cat" id="front-cat"></div>
      <div class="known-badge">✓ Known</div>
      <div class="furigana-wrap"><div class="furigana-text" id="front-furigana"></div></div>
      <div class="kanji-main" id="front-kanji"></div>
      <div class="card-hint">tap to reveal ✦</div>
    </div>
    <div class="card-face card-back" id="card-back">
      <div class="peacock-eye pe-tl">${PEACOCK}</div>
      <div class="peacock-eye pe-br">${PEACOCK}</div>
      <div class="card-cat" id="back-cat"></div>
      <div class="back-kanji-small" id="back-kanji-small"></div>
      <div class="back-hira" id="back-hira"></div>
      <div class="back-meaning" id="back-meaning"></div>
      <div class="back-divider"></div>
      <div class="back-context" id="back-context"></div>
      <div class="back-sentence" id="back-sentence"></div>
      <div class="card-hint">tap to flip back ✦</div>
    </div>
  </div>`;
}

function render(){
  buildDeck();
  document.getElementById('stat-known').textContent=knownSet.size;
  document.getElementById('stat-total').textContent=ALL_CARDS.length;
  const area=document.getElementById('card-area');
  if(!deck.length){area.innerHTML='<div class="empty-state">🦚 No cards in this filter</div>';document.getElementById('counter').innerHTML='';buildProgress();return;}
  if(!area.querySelector('.card-3d')){area.innerHTML=cardHTML();area.onclick=flipCard;}
  const card=deck[currentIdx],known=knownSet.has(getKey(card));
  isFlipped=false;document.getElementById('card-3d').classList.remove('flipped');
  document.getElementById('flip-hint').textContent='✦ tap card to reveal meaning ✦';
  document.getElementById('front-cat').textContent=card.cat;
  document.getElementById('front-furigana').textContent=card.reading;
  document.getElementById('front-kanji').textContent=card.kanji;
  document.getElementById('card-front').className='card-face'+(known?' is-known':'');
  document.getElementById('back-cat').textContent=card.cat;
  document.getElementById('back-kanji-small').textContent=card.kanji;
  document.getElementById('back-hira').textContent=card.reading;
  document.getElementById('back-meaning').textContent=card.meaning;
  document.getElementById('back-context').textContent=card.context;
  document.getElementById('back-sentence').textContent=card.sentence||'';
  document.getElementById('counter').innerHTML=`<span>${currentIdx+1}</span> / ${deck.length}`;
  buildProgress();
}

function flipCard(){
  if(!deck.length||!document.getElementById('card-3d')) return;
  isFlipped=!isFlipped;document.getElementById('card-3d').classList.toggle('flipped',isFlipped);
  document.getElementById('flip-hint').textContent=isFlipped?'✦ tap to flip back ✦':'✦ tap card to reveal meaning ✦';
}
function navigate(dir){if(!deck.length) return;currentIdx=(currentIdx+dir+deck.length)%deck.length;render();}
function flashCard(col,shadow){
  const f=document.getElementById('card-front');if(!f) return;
  f.style.borderColor=col;f.style.boxShadow='0 0 30px '+shadow;
  setTimeout(()=>{f.style.borderColor='';f.style.boxShadow='';},450);
}
function markKnown(){if(!deck.length) return;knownSet.add(getKey(deck[currentIdx]));learningSet.delete(getKey(deck[currentIdx]));flashCard('#66bb6a','rgba(46,125,79,0.5)');setTimeout(()=>navigate(1),340);}
function markLearning(){if(!deck.length) return;learningSet.add(getKey(deck[currentIdx]));knownSet.delete(getKey(deck[currentIdx]));flashCard('#ef5350','rgba(183,28,28,0.5)');render();}
function speakCard(){
  if(!deck.length) return;const card=deck[currentIdx];const btn=document.getElementById('btn-speak');
  if(!('speechSynthesis' in window)){btn.textContent='No TTS';return;}
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(card.kanji+'。'+card.reading);utt.lang='ja-JP';utt.rate=0.8;
  btn.classList.add('speaking');btn.textContent='♪ Playing';
  utt.onend=utt.onerror=()=>{btn.classList.remove('speaking');btn.textContent='♪ Listen';};
  window.speechSynthesis.speak(utt);
}
document.getElementById('btn-shuffle').addEventListener('click',function(){
  for(let i=ALL_CARDS.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ALL_CARDS[i],ALL_CARDS[j]]=[ALL_CARDS[j],ALL_CARDS[i]];}
  currentIdx=0;this.style.background='linear-gradient(135deg,#0d47a1,#ffe066)';this.style.color='#fff';this.style.borderColor='transparent';
  setTimeout(()=>{this.style.background='';this.style.color='';this.style.borderColor='';},600);render();
});
document.getElementById('btn-hide-known').addEventListener('click',function(){
  hideKnown=!hideKnown;this.classList.toggle('on',hideKnown);this.textContent=hideKnown?'Show All':'Hide Known';currentIdx=0;render();
});
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if(e.key==='ArrowRight'||e.key==='l') navigate(1);
  else if(e.key==='ArrowLeft'||e.key==='h') navigate(-1);
  else if(e.key===' '||e.key==='f'){e.preventDefault();flipCard();}
  else if(e.key==='k') markKnown();
  else if(e.key==='x') markLearning();
  else if(e.key==='s') speakCard();
});
loadWords();
</script>
</body>
</html>
