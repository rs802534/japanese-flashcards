<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 Flash — Neo Tokyo</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffb4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JP Flash">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #07070f;
  color: #c8d8cc;
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}
:root {
  --neon: #00ffb4;
  --neon2: #ff2d6b;
  --card-bg: #0f1620;
  --border: #00ffb420;
  --border-bright: #00ffb470;
  --text-muted: #4a6a5a;
  --text-mid: #7aaa90;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,255,180,0.012) 3px, rgba(0,255,180,0.012) 4px);
  pointer-events: none; z-index: 9999;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,255,180,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(0,255,180,0.04) 1px,transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
.app { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 24px 16px 60px; }

.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; border-bottom: 1px solid var(--border); padding-bottom: 14px; }
.logo { font-size: 10px; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 12px #00ffb490; }
.logo span { color: var(--neon2); }
.stats-bar { display: flex; gap: 20px; font-size: 11px; color: var(--text-muted); }
.stats-bar b { color: var(--neon); }

.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; align-items: center; }
.filter-label { font-size: 10px; letter-spacing: 2px; color: var(--text-muted); margin-right: 4px; }
.cat-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; border-radius: 2px; }
.cat-btn:hover { border-color: var(--neon); color: var(--neon); }
.cat-btn.active { background: #00ffb415; border-color: var(--neon); color: var(--neon); }
.cat-btn[data-cat="SAP-MM"].active          { border-color:#ff2d6b; color:#ff2d6b; background:#ff2d6b12; }
.cat-btn[data-cat="SAP-SD"].active          { border-color:#7b61ff; color:#7b61ff; background:#7b61ff12; }
.cat-btn[data-cat="SAP-Security"].active    { border-color:#00c8ff; color:#00c8ff; background:#00c8ff12; }
.cat-btn[data-cat="Project"].active         { border-color:#ffb800; color:#ffb800; background:#ffb80012; }
.cat-btn[data-cat="General Business"].active{ border-color:#00ffb4; color:#00ffb4; background:#00ffb415; }
.controls { display: flex; gap: 8px; margin-left: auto; }
.ctrl-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; font-family: 'Share Tech Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; border-radius: 2px; }
.ctrl-btn:hover { border-color: var(--neon); color: var(--neon); }
.ctrl-btn.on { border-color: var(--neon); color: var(--neon); background: #00ffb415; }

.cat-progress { margin-bottom: 24px; display: flex; flex-direction: column; gap: 7px; }
.prog-row { display: flex; align-items: center; gap: 10px; }
.prog-name { width: 110px; font-size: 9px; letter-spacing: 1px; flex-shrink: 0; }
.prog-track { flex: 1; height: 3px; background: #ffffff0a; border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.prog-count { width: 36px; text-align: right; font-size: 9px; }

.counter { text-align: center; font-size: 11px; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 20px; }
.counter span { color: var(--neon); }

.card-area { perspective: 1200px; margin-bottom: 20px; cursor: pointer; }
.card-3d { position: relative; width: 100%; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.23,1,0.32,1); }
.card-3d.flipped { transform: rotateY(180deg); }
.card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; padding: 40px 32px; min-height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
.card-back { position: absolute; top: 0; left: 0; width: 100%; transform: rotateY(180deg); }
.card-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 4px 4px 0 0; }
.card-cat-tag { position: absolute; top: 14px; left: 16px; font-size: 9px; letter-spacing: 2px; opacity: 0.7; }
.card-hint { position: absolute; bottom: 14px; right: 16px; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }
.known-badge { position: absolute; top: 14px; right: 16px; font-size: 9px; letter-spacing: 2px; padding: 3px 8px; border: 1px solid #00ffb460; color: var(--neon); background: #00ffb410; border-radius: 2px; display: none; }
.card-face.is-known .known-badge { display: block; }
.kanji-main { font-family: 'Noto Serif JP', serif; font-size: 64px; font-weight: 700; color: #fff; text-shadow: 0 0 30px rgba(0,255,180,0.2); line-height: 1; margin-bottom: 14px; text-align: center; }
.reading-main { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 300; letter-spacing: 4px; text-align: center; }
.back-meaning { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 10px; letter-spacing: 1px; text-align: center; }
.back-context { font-size: 12px; color: var(--text-muted); text-align: center; letter-spacing: 1px; line-height: 1.8; max-width: 400px; }
.back-divider { width: 40px; height: 1px; background: var(--border-bright); margin: 14px auto; }
.back-kanji-small { font-family: 'Noto Serif JP', serif; font-size: 18px; color: var(--text-mid); margin-bottom: 4px; text-align: center; }

.flip-hint { text-align: center; font-size: 10px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 6px; }
.actions { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.act-btn { background: transparent; border: 1px solid; padding: 10px 18px; font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; cursor: pointer; transition: all 0.15s; border-radius: 2px; }
.btn-known    { border-color: #00ffb450; color: var(--neon); }
.btn-known:hover    { background: #00ffb415; border-color: var(--neon); box-shadow: 0 0 12px #00ffb430; }
.btn-learning { border-color: #ff2d6b50; color: #ff2d6b; }
.btn-learning:hover { background: #ff2d6b12; border-color: #ff2d6b; }
.btn-speak    { border-color: #7b61ff50; color: #7b61ff; }
.btn-speak:hover    { background: #7b61ff12; border-color: #7b61ff; }
.btn-nav { border-color: var(--border); color: var(--text-mid); }
.btn-nav:hover { border-color: var(--neon); color: var(--neon); }
@keyframes pulse-ring { 0%{box-shadow:0 0 0 0 #7b61ff60} 70%{box-shadow:0 0 0 8px transparent} 100%{box-shadow:0 0 0 0 transparent} }
.btn-speak.speaking { animation: pulse-ring 0.8s infinite; background: #7b61ff20; }
.kb-hint { text-align: center; font-size: 9px; color: var(--text-muted); letter-spacing: 2px; opacity: 0.5; }
.kb-hint span { border: 1px solid #ffffff10; padding: 1px 5px; border-radius: 2px; margin: 0 2px; }

/* Install banner */
#install-banner { display: none; position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #0f1620; border: 1px solid var(--neon); border-radius: 4px; padding: 12px 20px; font-size: 11px; letter-spacing: 1px; color: var(--neon); z-index: 1000; gap: 14px; align-items: center; box-shadow: 0 0 20px #00ffb430; }
#install-banner.show { display: flex; }
#install-banner button { background: var(--neon); color: #07070f; border: none; padding: 6px 14px; font-family: 'Share Tech Mono', monospace; font-size: 11px; cursor: pointer; border-radius: 2px; font-weight: 700; }
#install-banner .dismiss { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); }

.loading { text-align: center; padding: 80px 20px; font-size: 12px; color: var(--text-muted); letter-spacing: 3px; }
@keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }
.loading span { animation: blink 1.2s infinite; }
.empty-state { text-align: center; padding: 80px 20px; font-size: 12px; color: var(--text-muted); letter-spacing: 2px; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="logo">日本語<span>//</span>FLASH <span style="font-size:9px;letter-spacing:3px;color:#4a6a5a">NEO-TOKYO</span></div>
    <div class="stats-bar">
      <div>KNOWN <b id="stat-known">0</b></div>
      <div>LEFT <b id="stat-left">0</b></div>
      <div>TOTAL <b id="stat-total">0</b></div>
    </div>
  </div>

  <div class="filters" id="filters">
    <span class="filter-label">MODULE</span>
    <button class="cat-btn active" data-cat="ALL">ALL</button>
    <div class="controls">
      <button class="ctrl-btn" id="btn-shuffle">⇄ SHUFFLE</button>
      <button class="ctrl-btn" id="btn-hide-known">HIDE KNOWN</button>
    </div>
  </div>

  <div class="cat-progress" id="cat-progress"></div>
  <div class="counter" id="counter"></div>

  <div class="card-area" id="card-area">
    <div class="loading"><span>LOADING WORDS</span></div>
  </div>

  <div class="flip-hint" id="flip-hint">── tap card to reveal meaning ──</div>

  <div class="actions">
    <button class="act-btn btn-nav"      onclick="navigate(-1)">◀ PREV</button>
    <button class="act-btn btn-speak"    id="btn-speak" onclick="speakCard()">▶ LISTEN</button>
    <button class="act-btn btn-known"    onclick="markKnown()">✓ KNOWN</button>
    <button class="act-btn btn-learning" onclick="markLearning()">✕ LEARNING</button>
    <button class="act-btn btn-nav"      onclick="navigate(1)">NEXT ▶</button>
  </div>

  <div class="kb-hint">
    <span>←→</span> navigate &nbsp;
    <span>SPACE</span> flip &nbsp;
    <span>K</span> known &nbsp;
    <span>X</span> learning &nbsp;
    <span>S</span> speak
  </div>

</div>

<!-- Install banner -->
<div id="install-banner">
  <span>📲 Install as app</span>
  <button id="install-btn">INSTALL</button>
  <button class="dismiss" id="dismiss-btn">✕</button>
</div>

<script>
const COLORS = {
  "SAP-MM":"#ff2d6b","SAP-SD":"#7b61ff",
  "SAP-Security":"#00c8ff","Project":"#ffb800","General Business":"#00ffb4"
};

let ALL_CARDS=[], deck=[], currentCat="ALL", currentIdx=0;
let isFlipped=false, hideKnown=false;
let knownSet=new Set(), learningSet=new Set();

function getKey(c){ return c.cat+"|"+c.kanji; }

/* ── SERVICE WORKER ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(err => console.log('SW error:', err));
  });
}

/* ── PWA INSTALL PROMPT ── */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
});
document.getElementById('dismiss-btn').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('show');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.remove('show');
});

/* ── LOAD words.json ── */
async function loadWords() {
  try {
    const res = await fetch('words.json?v=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    ALL_CARDS = await res.json();
    buildCategoryButtons();
    render();
  } catch(e) {
    document.getElementById('card-area').innerHTML =
      '<div class="empty-state">COULD NOT LOAD words.json<br><br>' +
      '<span style="color:#4a6a5a;font-size:10px">Make sure words.json is in the same folder as index.html</span></div>';
  }
}

/* ── CATEGORY BUTTONS ── */
function buildCategoryButtons() {
  const cats = [...new Set(ALL_CARDS.map(c => c.cat))];
  const filtersEl = document.getElementById('filters');
  const controls = document.querySelector('.controls');
  filtersEl.querySelectorAll('.cat-btn:not([data-cat="ALL"])').forEach(b => b.remove());
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat;
    btn.textContent = cat.replace('SAP-','').replace('General Business','GENERAL').toUpperCase();
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = cat; currentIdx = 0; render();
    });
    filtersEl.insertBefore(btn, controls);
  });
  document.querySelector('.cat-btn[data-cat="ALL"]').addEventListener('click', function(){
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentCat = "ALL"; currentIdx = 0; render();
  });
}

/* ── DECK ── */
function buildDeck() {
  deck = currentCat==="ALL" ? [...ALL_CARDS] : ALL_CARDS.filter(c=>c.cat===currentCat);
  if (hideKnown) deck = deck.filter(c=>!knownSet.has(getKey(c)));
  if (currentIdx >= deck.length) currentIdx = Math.max(0, deck.length-1);
}

/* ── PROGRESS ── */
function buildProgress() {
  const cats = [...new Set(ALL_CARDS.map(c=>c.cat))];
  const el = document.getElementById('cat-progress');
  el.innerHTML = '';
  cats.forEach(cat => {
    const total = ALL_CARDS.filter(c=>c.cat===cat).length;
    const known = ALL_CARDS.filter(c=>c.cat===cat && knownSet.has(getKey(c))).length;
    const col = COLORS[cat]||"#00ffb4";
    const pct = total ? Math.round(known/total*100) : 0;
    const label = cat.replace('SAP-','').replace('General Business','GENERAL BIZ').toUpperCase();
    const row = document.createElement('div');
    row.className = 'prog-row';
    row.innerHTML = `<div class="prog-name" style="color:${col}70">${label}</div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${col};box-shadow:0 0 6px ${col}80"></div></div>
      <div class="prog-count" style="color:${col}70">${known}/${total}</div>`;
    el.appendChild(row);
  });
}

/* ── CARD HTML ── */
function buildCardHTML() {
  return `<div class="card-3d" id="card-3d">
    <div class="card-face" id="card-front">
      <div class="card-accent" id="front-accent"></div>
      <div class="card-cat-tag" id="front-cat"></div>
      <div class="kanji-main" id="front-kanji"></div>
      <div class="reading-main" id="front-reading"></div>
      <div class="card-hint">TAP TO FLIP</div>
      <div class="known-badge">✓ KNOWN</div>
    </div>
    <div class="card-face card-back" id="card-back">
      <div class="card-accent" id="back-accent"></div>
      <div class="card-cat-tag" id="back-cat"></div>
      <div class="back-kanji-small" id="back-kanji-small"></div>
      <div class="back-meaning" id="back-meaning"></div>
      <div class="back-divider"></div>
      <div class="back-context" id="back-context"></div>
      <div class="card-hint">TAP TO FLIP BACK</div>
    </div>
  </div>`;
}

/* ── RENDER ── */
function render() {
  buildDeck();
  document.getElementById('stat-known').textContent = knownSet.size;
  document.getElementById('stat-total').textContent = ALL_CARDS.length;
  document.getElementById('stat-left').textContent = deck.filter(c=>!knownSet.has(getKey(c))).length;
  const area = document.getElementById('card-area');
  if (!deck.length) {
    area.innerHTML = '<div class="empty-state">NO CARDS IN THIS FILTER</div>';
    document.getElementById('counter').innerHTML = '';
    buildProgress(); return;
  }
  if (!area.querySelector('.card-3d')) {
    area.innerHTML = buildCardHTML();
    area.onclick = flipCard;
  }
  const card = deck[currentIdx];
  const col = COLORS[card.cat]||"#00ffb4";
  const known = knownSet.has(getKey(card));
  isFlipped = false;
  document.getElementById('card-3d').classList.remove('flipped');
  document.getElementById('flip-hint').textContent = '── tap card to reveal meaning ──';
  document.getElementById('front-accent').style.background = `linear-gradient(90deg,${col},transparent)`;
  document.getElementById('front-cat').textContent = card.cat;
  document.getElementById('front-cat').style.color = col;
  document.getElementById('front-kanji').textContent = card.kanji;
  document.getElementById('front-reading').textContent = card.reading;
  document.getElementById('front-reading').style.color = col;
  document.getElementById('front-reading').style.textShadow = `0 0 10px ${col}50`;
  document.getElementById('card-front').className = 'card-face'+(known?' is-known':'');
  document.getElementById('back-accent').style.background = `linear-gradient(90deg,${col},transparent)`;
  document.getElementById('back-cat').textContent = card.cat;
  document.getElementById('back-cat').style.color = col;
  document.getElementById('back-kanji-small').textContent = card.kanji+'（'+card.reading+'）';
  document.getElementById('back-kanji-small').style.color = col;
  document.getElementById('back-meaning').textContent = card.meaning;
  document.getElementById('back-context').textContent = card.context;
  document.getElementById('counter').innerHTML = `<span>${currentIdx+1}</span> / ${deck.length}`;
  buildProgress();
}

function flipCard() {
  if (!deck.length||!document.getElementById('card-3d')) return;
  isFlipped = !isFlipped;
  document.getElementById('card-3d').classList.toggle('flipped', isFlipped);
  document.getElementById('flip-hint').textContent = isFlipped ? '── tap card to flip back ──' : '── tap card to reveal meaning ──';
}
function navigate(dir) {
  if (!deck.length) return;
  currentIdx = (currentIdx+dir+deck.length)%deck.length;
  render();
}
function flashBorder(col) {
  const f = document.getElementById('card-front'); if (!f) return;
  f.style.borderColor=col; f.style.boxShadow=`0 0 28px ${col}40`;
  setTimeout(()=>{ f.style.borderColor=''; f.style.boxShadow=''; },400);
}
function markKnown() {
  if (!deck.length) return;
  knownSet.add(getKey(deck[currentIdx]));
  learningSet.delete(getKey(deck[currentIdx]));
  flashBorder('#00ffb4');
  setTimeout(()=>navigate(1), 320);
}
function markLearning() {
  if (!deck.length) return;
  learningSet.add(getKey(deck[currentIdx]));
  knownSet.delete(getKey(deck[currentIdx]));
  flashBorder('#ff2d6b'); render();
}
function speakCard() {
  if (!deck.length) return;
  const card = deck[currentIdx];
  const btn = document.getElementById('btn-speak');
  if (!('speechSynthesis' in window)) { btn.textContent='NO TTS'; return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(card.kanji+'。'+card.reading);
  utt.lang='ja-JP'; utt.rate=0.8;
  btn.classList.add('speaking'); btn.textContent='▶ PLAYING';
  utt.onend = utt.onerror = ()=>{ btn.classList.remove('speaking'); btn.textContent='▶ LISTEN'; };
  window.speechSynthesis.speak(utt);
}

document.getElementById('btn-shuffle').addEventListener('click', function(){
  for (let i=ALL_CARDS.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [ALL_CARDS[i],ALL_CARDS[j]]=[ALL_CARDS[j],ALL_CARDS[i]];
  }
  currentIdx=0;
  this.style.color='#00ffb4'; this.style.borderColor='#00ffb4';
  setTimeout(()=>{ this.style.color=''; this.style.borderColor=''; },500);
  render();
});
document.getElementById('btn-hide-known').addEventListener('click', function(){
  hideKnown=!hideKnown;
  this.classList.toggle('on',hideKnown);
  this.textContent = hideKnown ? 'SHOW ALL' : 'HIDE KNOWN';
  currentIdx=0; render();
});
document.addEventListener('keydown', e=>{
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (e.key==='ArrowRight'||e.key==='l') navigate(1);
  else if (e.key==='ArrowLeft'||e.key==='h') navigate(-1);
  else if (e.key===' '||e.key==='f'){e.preventDefault();flipCard();}
  else if (e.key==='k') markKnown();
  else if (e.key==='x') markLearning();
  else if (e.key==='s') speakCard();
});

loadWords();
</script>
</body>
</html>
